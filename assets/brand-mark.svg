<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CloudSrv">
  <defs>
    <linearGradient id="cs-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="cs-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <filter id="cs-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.4" flood-color="#0B1220" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Back cloud: white/light, upper-left -->
  <g filter="url(#cs-shadow)">
    <g fill="url(#cs-back)" stroke="#CBD5E1" stroke-width="1.1">
      <circle cx="12" cy="20" r="5.5"/>
      <circle cx="18.5" cy="14.5" r="7"/>
      <circle cx="25" cy="20" r="5.5"/>
      <rect x="12" y="20" width="13" height="5"/>
    </g>
  </g>

  <!-- Front cloud: cyan gradient, lower-right (overlapping) -->
  <g filter="url(#cs-shadow)">
    <g fill="url(#cs-front)">
      <circle cx="23" cy="30" r="5.5"/>
      <circle cx="30" cy="24" r="7.2"/>
      <circle cx="37" cy="30" r="5.5"/>
      <rect x="23" y="30" width="14" height="5"/>
    </g>
  </g>

  <!-- Upload arrow inside the cyan cloud -->
  <path d="M30 33 V24 M25.5 28.5 L30 24 L34.5 28.5"
        stroke="#FFFFFF" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
